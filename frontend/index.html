<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>Fault Solver - Async Edition</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
        }

        .header {
            padding: 12px;
            background: #1e293b;
            font-size: 18px;
            border-bottom: 1px solid #334155;
        }

        .container {
            display: flex;
            height: calc(100vh - 45px);
        }

        /* LEFT TREE */
        .sidebar {
            width: 320px;
            background: #020617;
            border-right: 1px solid #334155;
            overflow-y: auto;
            padding: 10px;
        }

        .node {
            padding: 6px;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .node:hover {
            background: #1e293b;
        }

        .node-loading {
            color: #38bdf8;
            cursor: wait;
        }

        .node-loading::after {
            content: " 🔄";
            font-size: 12px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }

        .node-expanded {
            font-weight: bold;
            color: #38bdf8;
        }

        /* RIGHT PANEL */
        .content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .card {
            background: #1e293b;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 8px;
            border: 1px solid #334155;
        }

        .title {
            font-size: 22px;
            margin-bottom: 15px;
            color: #38bdf8;
        }

        /* --- LOADING SPINNER STYLES --- */
        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #1e293b;
            border-top: 4px solid #38bdf8;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 10px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <div class="header">
        🚀 Fault Solver System <span style="font-size: 12px; color: #94a3b8;">(Celery Powered)</span>
    </div>

    <div class="container">
        <div class="sidebar" id="tree"></div>

        <div class="content" id="content">
            <div class="title">בחר פריט מהעץ כדי להציג תקלות</div>
            <p style="color: #64748b;">המערכת תטען את הנתונים אסינכרונית באמצעות תור משימות.</p>
        </div>
    </div>

    <script type="module" src="script.js"></script>

    <script>
        console.log("✅ HTML Core Loaded");
    </script>

</body>

</html>
