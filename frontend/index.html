<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>Fault Solver - Async Edition</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
        }

        .header {
            padding: 12px;
            background: #1e293b;
            font-size: 18px;
            border-bottom: 1px solid #334155;
        }

        .container {
            display: flex;
            height: calc(100vh - 45px);
        }

        /* LEFT TREE */
        .sidebar {
            width: 320px;
            background: #020617;
            border-right: 1px solid #334155;
            overflow-y: auto;
            padding: 10px;
        }

        .node {
            padding: 6px;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .node:hover {
            background: #1e293b;
        }

        .node-loading {
            color: #38bdf8;
            cursor: wait;
        }

        .node-loading::after {
            content: " 🔄";
            font-size: 12px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }

        .node-expanded {
            font-weight: bold;
            color: #38bdf8;
        }

        /* RIGHT PANEL */
        .content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .card {
            background: #1e293b;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 8px;
            border: 1px solid #334155;
        }

        .title {
            font-size: 22px;
            margin-bottom: 15px;
            color: #38bdf8;
        }

        /* --- LOADING SPINNER STYLES --- */
        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #1e293b;
            border-top: 4px solid #38bdf8;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 10px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .expand-btn {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            background-color: #f1f5f9;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            color: #475569;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .expand-btn:hover {
            background-color: #e2e8f0;
            color: #1e293b;
        }

        .expand-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .tree-icon {
            display: inline-block;
            width: 20px;
            cursor: pointer;
            margin-right: 5px;
            font-weight: bold;
        }

        .tree-item-header:hover .tree-icon {
            color: #2563eb;
        }
    </style>
</head>

<body>

    <div class="header">
        Fault Solver System <span style="font-size: 12px; color: #94a3b8;">(Celery Powered)</span>
    </div>

    <div class="container">
        <div class="sidebar">
            <button id="expand-all-btn" class="expand-btn"
                style="width: 100%; margin-bottom: 10px; padding: 10px; background: #2563eb; color: white; border: none; border-radius: 5px; cursor: pointer;">
                <i class="bi bi-arrows-expand"></i> פתח הכל
            </button>

            <div id="tree"></div>
        </div>

        <div class="content" id="content">
            <div class="title">בחר פריט מהעץ כדי להציג תקלות</div>
            <p style="color: #64748b;">המערכת תטען את הנתונים אסינכרונית באמצעות תור משימות.</p>
        </div>
    </div>

    <script type="module" src="script.js"></script>

    <script>
        document.addEventListener('click', function (e) {
            if (e.target && e.target.id === 'expand-all-btn') {
                expandAllNodes();
            }
        });

        async function expandAllNodes() {
            const btn = document.getElementById('expand-all-btn');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = "טוען שכבות...";

            async function run() {
                // מחפש את כל הדיבים של הכותרות בעץ (התאם את ה-Selector אם צריך)
                const headers = Array.from(document.querySelectorAll('#tree div'))
                    .filter(el => {
                        // אנחנו מחפשים אלמנטים שיש להם בנים פוטנציאליים אבל הם סגורים
                        const content = el.nextElementSibling;
                        return el.onclick || el.getAttribute('onclick') || (content && content.style.display === 'none');
                    });

                if (headers.length === 0) return false;

                let openedCount = 0;
                for (let h of headers) {
                    const content = h.nextElementSibling;
                    if (!content || content.style.display === 'none') {
                        h.click(); // מדמה לחיצה
                        openedCount++;
                    }
                }
                return openedCount > 0;
            }

            // לולאה שרצה עד שאין יותר מה לפתוח
            let continuing = true;
            while (continuing) {
                continuing = await run();
                if (continuing) await new Promise(r => setTimeout(r, 1000)); // מחכה ל-API
            }

            btn.disabled = false;
            btn.innerHTML = originalText;
            console.log("Finished expanding all visible nodes");
        }

        // הוסף את זה בסוף ה-script
        document.getElementById('expand-all-btn').addEventListener('click', async function () {
            const btn = this;
            btn.disabled = true;
            btn.innerHTML = "טוען מערכות (305)...";

            async function expandAll() {
                // 1. מוצא את כל הפריטים שניתן ללחוץ עליהם (פרויקטים ומערכות)
                // 1. מוצא את כל הפריטים שניתן ללחוץ עליהם
                // --- שלב 3: סריקת הכותרות ועדכון אייקונים ---
                const headers = document.querySelectorAll('.tree-item-header');
                let openedAny = false;

                for (let header of headers) {
                    const content = header.nextElementSibling;
                    // חילוץ האייקון מתוך הכותרת הנוכחית
                    const icon = header.querySelector('.bi-plus-square, .bi-dash-square, .tree-icon');

                    if (!content || content.style.display === 'none') {
                        header.click();

                        // עדכון ויזואלי של האייקון למינוס (כי הענף נפתח)
                        if (icon) {
                            icon.classList.remove('bi-plus-square');
                            icon.classList.add('bi-dash-square');
                        }

                        openedAny = true;
                    }
                }
                // 2. אם נפתחו פריטים, מחכים שנייה שה-API יחזיר את הבנים שלהם ומנסים שוב
                if (openedAny) {
                    console.log("Found new items, waiting for API...");
                    await new Promise(r => setTimeout(r, 1000));
                    return expandAll(); // רקורסיה לשכבה הבאה
                }
                return true;
            }

            await expandAll();
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-arrows-expand"></i> פתח הכל';
        });
        console.log("✅ HTML Core Loaded");
    </script>

</body>

</html>
